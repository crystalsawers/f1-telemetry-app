steps:
  # Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "australia-southeast1-docker.pkg.dev/$PROJECT_ID/f1-stack/f1-telemetry-api:$COMMIT_SHA"
      - "."

  # Push Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "australia-southeast1-docker.pkg.dev/$PROJECT_ID/f1-stack/f1-telemetry-api:$COMMIT_SHA"

images:
  - "australia-southeast1-docker.pkg.dev/$PROJECT_ID/f1-stack/f1-telemetry-api:$COMMIT_SHA"